server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 11 leaderboard/power screenshots per upload can add up well past nginx's
    # 1m default; raise it for the whole vhost to match nginx-proxy's own limit.
    client_max_body_size 25m;

    # Proxy API calls to the backend services.
    # NOTE: proxy_pass with a trailing "/" strips the matched location prefix,
    # so /api/auth/login -> authservice:8000/login (authservice mounts its
    # auth router at root, see mrbloop_BE/authservice/app/main.py) and
    # /api/alliance/members -> alliancemanagement:8000/members (that
    # service's routers already carry their own /members etc. prefix).
    location /api/auth/ {
        proxy_pass         http://authservice:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/alliance/ {
        proxy_pass         http://alliancemanagement:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass         http://autoredeemgifts:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Vue Router history mode: serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
