services:

  # ─── Reverse proxy: receives all traffic from outside on 80/443 ──────────────
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro

  # ─── Asks and updates Let's Encrypt certificates automatically ───────────────
  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: nginx-proxy-acme
    restart: unless-stopped
    depends_on:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NGINX_PROXY_CONTAINER=nginx-proxy

  # ─── Database: not more publicly accessible in production ──────────────────────
  mysql:
    ports: !reset []

  # ─── AutoRedeemGifts API: only internally accessible, nginx-proxy forwards requests ───
  autoredeemgifts:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    ports: !reset []

  # ─── Alliance Management API: only internally accessible ────────────────────
  alliancemanagement:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    ports: !reset []

  # ─── Auth Service: only internally accessible ────────────────────────────────
  authservice:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    ports: !reset []

  # ─── Frontend: nginx-proxy handles 80/443, this container doesn't need to be public ───
  frontend:
    ports: !reset []
    environment:
      - VIRTUAL_HOST=mrbloop.com
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=mrbloop.com
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - CLIENT_MAX_BODY_SIZE=25m

volumes:
  certs:
  vhost:
  html:
  acme:
