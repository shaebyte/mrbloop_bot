services:

  # ─── Database ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mrbloop_mysql
    env_file:
      - ./db.env
    volumes:
      # Init scripts are executed alphabetically on first startup
      - ./mrbloop_db/migrations:/docker-entrypoint-initdb.d:ro
      # Persistent storage: data is preserved across container restarts/rebuilds
      - mysql_data:/var/lib/mysql
    ports:
      # Optional: remove this line if you don't need direct access via MySQL Workbench
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Discord bot ─────────────────────────────────────────────────────────────
  discordbot:
    build: ./mrbloop_BE/discordbot
    env_file:
      - ./db.env
      - ./mrbloop_BE/discordbot/.env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ─── AutoRedeemGifts: API + poller (lifespan) ────────────────────────────────
  autoredeemgifts:
    build: ./mrbloop_BE/autoredeemgifts_v5
    env_file:
      - ./db.env
      - ./mrbloop_BE/autoredeemgifts_v5/.env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ─── Alliance Management: member/attendance API (OCR) ───────────────────────
  alliancemanagement:
    build: ./mrbloop_BE/alliancemanagement
    env_file:
      - ./db.env
      - ./mrbloop_BE/alliancemanagement/.env
    ports:
      - "8010:8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ─── Auth Service: shared login + user/role management ──────────────────────
  authservice:
    build: ./mrbloop_BE/authservice
    env_file:
      - ./db.env
      - ./mrbloop_BE/authservice/.env
    ports:
      - "8020:8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend + Nginx ────────────────────────────────────────────────────────
  frontend:
    build: ./mrbloop_FE
    ports:
      - "80:80"
    depends_on:
      - autoredeemgifts
      - alliancemanagement
      - authservice
    restart: unless-stopped

volumes:
  mysql_data:
